name: Daily Data Sync

# Free, cloud-native alternative to a machine that has to stay on: GitHub Actions
# runs this on GitHub's own infrastructure (unlimited minutes on a public repo),
# then commits + pushes the refreshed worldcup.db back to this same repo using
# the built-in token — no separate credentials needed. Render auto-redeploys on
# that push, so this closes sync -> commit -> push -> deploy end to end for free.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:       # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run incremental sync
        working-directory: backend
        env:
          ZAFRONIX_KEY: ${{ secrets.ZAFRONIX_KEY }}
        run: python update.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/worldcup.db
          if git diff --cached --quiet; then
            echo "No changes to commit — data already up to date."
          else
            git commit -m "Automated daily sync: update recent match data"
            git push
          fi
